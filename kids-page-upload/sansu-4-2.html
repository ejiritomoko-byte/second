initStudyApp({storageKey:"sansu-4-2",pageTitle:"算数 4-2 円と割合",subject:"算数",unit:"4-2 円と割合",description:"円のまわりの長さ・面積・おうぎ形と、割合の表し方をまとめて練習するアプリです。",meta:["範囲: 円 / おうぎ形 / 割合 / 歩合","中心: 公式を使う / もとにする量を見つける","コツ: 小数・分数・百分率を行き来する"],summaryPoints:[{title:"円周の長さ",body:"直径×3.14、または半径×2×3.14 で求めます。"},{title:"円の面積",body:"半径×半径×3.14 で求めます。半径を二回かけることを忘れません。"},{title:"おうぎ形",body:"円全体の何分のいくつかを考えます。中心角÷360 を使います。"},{title:"割合の表し方",body:"0.25=25%=1/4 のように、小数・百分率・分数をつなげて覚えます。"},{title:"もとにする量と比べられる量",body:"割合=比べられる量÷もとにする量。問題文でどちらがもとかを見分けます。"}],timeline:[{year:"1",event:"円周と面積の公式を確認する"},{year:"2",event:"おうぎ形は円全体の何分のいくつかで考える"},{year:"3",event:"割合・百分率・歩合を同じ意味で変換する"},{year:"4",event:"文章題では、もとにする量を先に決める"}],terms:[{word:"半径",meaning:"円の中心から円周までの長さ。"},{word:"中心角",meaning:"おうぎ形の中心の角の大きさ。"},{word:"百分率",meaning:"100をもとにして表した割合。25%=25/100。"},{word:"歩合",meaning:"1割=10%、1分=1%、1厘=0.1%。"}],flashcards:[{front:"円周",back:"直径×3.14"},{front:"円の面積",back:"半径×半径×3.14"},{front:"おうぎ形の弧の長さ",back:"円周×中心角÷360"},{front:"おうぎ形の面積",back:"円の面積×中心角÷360"},{front:"0.25",back:"25%=1/4"},{front:"0.5",back:"50%=1/2=5割"},{front:"0.75",back:"75%=3/4"},{front:"0.1",back:"10%=1/10=1割"},{front:"0.01",back:"1%=1/100=1分"},{front:"1割",back:"10%=0.1"},{front:"2割5分",back:"25%=0.25"},{front:"7割",back:"70%=0.7"},{front:"12.5%",back:"0.125=1/8"},{front:"半径4cmの円周",back:"4×2×3.14=25.12cm"},{front:"半径3cmの円の面積",back:"3×3×3.14=28.26cm²"},{front:"中心角90度",back:"円全体の1/4"},{front:"中心角180度",back:"円全体の1/2"},{front:"割合",back:"比べられる量÷もとにする量"},{front:"比べられる量",back:"割合×もとにする量"},{front:"もとにする量",back:"比べられる量÷割合"},{front:"3割",back:"30%=0.3"},{front:"6分",back:"6%=0.06"}],quiz:[{question:"半径3cmの円の円周はどれですか。",choices:["9.42cm","18.84cm","28.26cm","37.68cm"],answerIndex:1,explanation:"3×2×3.14=18.84cm です。"},{question:"半径4cmの円の面積はどれですか。",choices:["25.12cm²","50.24cm²","16cm²","12.56cm²"],answerIndex:1,explanation:"4×4×3.14=50.24cm² です。"},{question:"中心角90度のおうぎ形の面積は、円全体の何分のいくつですか。",choices:["1/2","1/3","1/4","1/5"],answerIndex:2,explanation:"90÷360=1/4 です。"},{question:"0.25 を百分率で表すとどれですか。",choices:["2.5%","25%","250%","0.25%"],answerIndex:1,explanation:"0.25=25/100 なので 25% です。"},{question:"60% を歩合で表すとどれですか。",choices:["6割","6分","60割","0.6割"],answerIndex:0,explanation:"10%が1割なので 60%は6割です。"},{question:"1割2分5厘 を小数で表すとどれですか。",choices:["0.125","0.25","1.25","0.0125"],answerIndex:0,explanation:"0.1+0.02+0.005=0.125 です。"},{question:"割合の公式として正しいものはどれですか。",choices:["割合=もとにする量÷比べられる量","割合=比べられる量÷もとにする量","割合=比べられる量×もとにする量","割合=もとにする量-比べられる量"],answerIndex:1,explanation:"割合は、比べられる量をもとにする量で割って求めます。"},{question:"比べられる量が30で割合が0.6のとき、もとにする量はいくつですか。",choices:["18","36","50","60"],answerIndex:2,explanation:"30÷0.6=50 です。"},{question:"25% は分数で表すとどれですか。",choices:["1/2","1/4","1/5","2/5"],answerIndex:1,explanation:"25/100=1/4 です。"},{question:"半径6cm、中心角120度のおうぎ形の弧の長さはどれですか。",choices:["6.28cm","12.56cm","18.84cm","25.12cm"],answerIndex:1,explanation:"円周は37.68cm、その1/3で12.56cmです。"},{question:"0.75 にあたる百分率はどれですか。",choices:["7.5%","75%","750%","0.75%"],answerIndex:1,explanation:"0.75=75/100 です。"},{question:"3割 を小数で表すとどれですか。",choices:["0.03","0.3","3.0","30"],answerIndex:1,explanation:"1割=0.1 なので 3割=0.3 です。"},{question:"半径5cmの円の円周はどれですか。",choices:["15.7cm","31.4cm","78.5cm","25cm"],answerIndex:1,explanation:"5×2×3.14=31.4cm です。"},{question:"半径5cmの円の面積はどれですか。",choices:["31.4cm²","62.8cm²","78.5cm²","15.7cm²"],answerIndex:2,explanation:"5×5×3.14=78.5cm² です。"},{question:"中心角180度のおうぎ形は円全体のどれだけですか。",choices:["1/4","1/3","1/2","2/3"],answerIndex:2,explanation:"180÷360=1/2 です。"},{question:"比べられる量が24、もとにする量が80のとき、割合はいくつですか。",choices:["0.2","0.25","0.3","0.4"],answerIndex:2,explanation:"24÷80=0.3 です。"},{question:"12.5% を分数で表すとどれですか。",choices:["1/2","1/4","1/8","1/10"],answerIndex:2,explanation:"12.5%=0.125=1/8 です。"},{question:"6分 を百分率で表すとどれですか。",choices:["0.6%","6%","60%","600%"],answerIndex:1,explanation:"1分=1% なので 6分=6% です。"},{question:"割合が0.4でもとにする量が90のとき、比べられる量はいくつですか。",choices:["18","36","45","54"],answerIndex:1,explanation:"90×0.4=36 です。"},{question:"おうぎ形の面積を求めるときに使う考え方はどれですか。",choices:["円全体の面積に、中心角÷360をかける","半径に中心角を足す","円周をそのまま使う","直径を4倍する"],answerIndex:0,explanation:"おうぎ形は円の一部なので、円全体の何分のいくつかで考えます。"}],checkItems:[{title:"円周と面積の公式をすぐ言える",note:"円周=直径×3.14、面積=半径×半径×3.14。"},{title:"おうぎ形で中心角÷360を使える",note:"弧の長さも面積も同じ割合で考える。"},{title:"小数・百分率・分数・歩合を変換できる",note:"0.25=25%=1/4=2割5分のように変換する。"},{title:"文章題で、もとにする量を見分けられる",note:"割合の公式を逆に使って求める。"}],footer:"算数 4-2 は、円の公式と割合の変換をまとめて使えるようにするのが大事です。"});
