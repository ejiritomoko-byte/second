ation:"おしべで花粉がつくられます。"},{question:"花粉がめしべの先につくことを何といいますか。",choices:["受精","受粉","発芽","ふ化"],answerIndex:1,explanation:"花粉がめしべにつくのが受粉です。"},{question:"精細胞と卵細胞が結びつくことを何といいますか。",choices:["受粉","受精","発芽","生長"],answerIndex:1,explanation:"受精によって新しい命が始まります。"},{question:"おしべとめしべの両方がある花を何といいますか。",choices:["不完全花","単性花","完全花","裸子植物"],answerIndex:2,explanation:"両方ある花は完全花です。"},{question:"1つの花にめしべだけがある花はどれに入りますか。",choices:["両性花","単性花","完全花","受粉花"],answerIndex:1,explanation:"どちらか一方だけの花は単性花です。"},{question:"受精したあとの子房はどうなりますか。",choices:["根になる","花粉になる","実になる","葉になる"],answerIndex:2,explanation:"子房は実になります。"},{question:"受精したあとの胚珠はどうなりますか。",choices:["種子になる","花びらになる","がくになる","おしべになる"],answerIndex:0,explanation:"胚珠は種子になります。"},{question:"カボチャの花の説明として正しいものはどれですか。",choices:["1つの花におしべとめしべが両方ある","おばなとめばながある","花をつくらない","水の中で受粉する"],answerIndex:1,explanation:"カボチャはおばなとめばなが分かれています。"},{question:"メダカのメスの特徴として正しいものはどれですか。",choices:["腹がふくらみ卵をもつ","しりびれが大きくとがる","花粉をつくる","へそのおがある"],answerIndex:0,explanation:"メスは腹がふくらみます。"},{question:"ヒトの赤ちゃんが育つ場所はどこですか。",choices:["子房","母体の体内","水そう","花びら"],answerIndex:1,explanation:"ヒトの赤ちゃんは母体の体内で育ちます。"},{question:"めしべの中で胚珠がある部分はどれですか。",choices:["柱頭","花柱","子房","やく"],answerIndex:2,explanation:"胚珠は子房の中にあります。"},{question:"アブラナはどのなかまですか。",choices:["不完全花","完全花","単性花","水生植物"],answerIndex:1,explanation:"アブラナは完全花の例です。"},{question:"受粉のあとにおこることとして正しいものはどれですか。",choices:["すぐに実になる","花粉の中の精細胞が胚珠へ向かう","葉が落ちる","花びらが根になる"],answerIndex:1,explanation:"受粉のあと、精細胞が胚珠へ向かいます。"},{question:"「たいばん」のはたらきとして正しいものはどれですか。",choices:["花粉をつくる","母体と赤ちゃんをつなぐ","水をすう","種子をつくる"],answerIndex:1,explanation:"たいばんは母体と赤ちゃんをつなぎます。"},{question:"メダカの卵を観察するとき、よく見えるものはどれですか。",choices:["子葉","目","花びら","しべ"],answerIndex:1,explanation:"育ってくると卵の中に目が見えてきます。"},{question:"おしべの先にある、花粉が入っている部分はどれですか。",choices:["やく","柱頭","胚珠","子房"],answerIndex:0,explanation:"やくの中に花粉があります。"},{question:"花びらの役目としていちばん近いものはどれですか。",choices:["昆虫をひきよせる","種子になる","養分を送る","水をすう"],answerIndex:0,explanation:"花びらは虫を引きよせる役目があります。"},{question:"受粉と受精のちがいとして正しいものはどれですか。"
