<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>理科 4-2 テスト対策</title>
  <link rel="stylesheet" href="study-app.css">
</head>
<body>
  <div class="shell">
    <header>
      <div class="hero">
        <span class="eyebrow" id="eyebrow"></span>
        <div>
          <h1 id="appTitle"></h1>
          <p id="appDescription"></p>
        </div>
        <div class="hero-meta" id="heroMeta"></div>
      </div>
    </header>

    <main>
      <div class="row" style="margin-top:0;margin-bottom:16px;">
        <a class="sub" href="index.html">教科一覧にもどる</a>
      </div>
      <div class="tabs">
        <button class="tab-btn active" data-tab="summary">まとめ</button>
        <button class="tab-btn" data-tab="flash">暗記カード</button>
        <button class="tab-btn" data-tab="quiz">4択クイズ</button>
        <button class="tab-btn" data-tab="check">確認</button>
      </div>

      <section id="summary" class="panel active">
        <div class="section-grid">
          <article class="card">
            <div class="card-head">
              <h2>テスト範囲の要点</h2>
              <span class="pill" id="pointCount"></span>
            </div>
            <div class="point-list" id="summaryPoints"></div>
          </article>
          <article class="card">
            <div class="card-head">
              <h2>流れで整理</h2>
              <span class="pill">生命のたん生</span>
            </div>
            <div class="timeline" id="timeline"></div>
          </article>
          <article class="card">
            <div class="card-head">
              <h2>重要語句</h2>
              <span class="pill">理科ことば</span>
            </div>
            <div class="terms" id="terms"></div>
          </article>
        </div>
      </section>

      <section id="flash" class="panel">
        <article class="card">
          <div class="card-head">
            <div>
              <h2>暗記カード</h2>
              <p>メダカ・ヒト・花のつくりを整理して覚えます。</p>
            </div>
            <span class="pill" id="flashCount"></span>
          </div>
          <div class="flash-grid" id="flashGrid"></div>
        </article>
      </section>

      <section id="quiz" class="panel">
        <article class="card">
          <div class="quiz-head">
            <h2>4択クイズ</h2>
            <div class="progress" id="progress"></div>
          </div>
          <div class="question" id="question"></div>
          <div class="choices" id="choices"></div>
          <div class="result" id="result"></div>
          <div class="row">
            <button id="nextBtn" class="action" style="display:none;">次の問題</button>
            <button id="restartBtn" class="sub">もう一回</button>
          </div>
        </article>
      </section>

      <section id="check" class="panel">
        <article class="card">
          <div class="card-head">
            <div>
              <h2>学習チェック</h2>
              <p>図を見なくても説明できるかを確認します。</p>
            </div>
            <span class="pill completion" id="completionRate"></span>
          </div>
          <div class="checklist" id="checklist"></div>
        </article>
      </section>
    </main>
    <footer id="footerNote"></footer>
  </div>
